name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      has-skills: ${{ steps.check-skills.outputs.has-skills }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate plugin structure
        run: claude plugin validate .

      - name: Lint markdown
        run: npx --yes markdownlint-cli "**/*.md"

      - name: Check for skills
        id: check-skills
        run: |
          shopt -s nullglob
          skill_dirs=(skills/*/)
          if [ ${#skill_dirs[@]} -gt 0 ]; then
            echo "has-skills=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-skills=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Release
    needs: validate
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.validate.outputs.has-skills == 'true'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install semantic-release
        run: |
          npm install --no-save \
            semantic-release \
            conventional-changelog-conventionalcommits \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/changelog \
            @semantic-release/github \
            @semantic-release/exec

      - name: Package skills
        run: |
          mkdir -p dist
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            zip -r "dist/${skill_name}.zip" "$skill_dir"
            echo "Packaged: dist/${skill_name}.zip"
          done

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
